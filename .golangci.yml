# SPDX-License-Identifier: Apache-2.0

version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - goimports

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - misspell
    - revive

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
