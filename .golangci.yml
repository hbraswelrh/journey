version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - goimports

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - misspell
    - revive
    - gocritic

  settings:
    revive:
      rules:
        - name: blank-imports
        - name: exported
        - name: unexported-return
        - name: var-naming
        - name: error-return
        - name: error-naming
        - name: increment-decrement
    gocritic:
      enabled-checks:
        - appendAssign
        - dupArg
        - dupCase
        - dupSubExpr
        - flagName
        - sloppyLen
    misspell:
      locale: US

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
